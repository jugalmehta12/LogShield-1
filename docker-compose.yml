services:
  postgres:
    image: postgres:16-alpine
    container_name: logshield-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: logshield
      POSTGRES_USER: logshield
      POSTGRES_PASSWORD: logshield
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logshield -d logshield"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: logshield-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://logshield:logshield@postgres:5432/logshield
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
